name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Inject Production Configuration
        run: |
          cat << EOF > src/config.js
          window.SCDNR_CONFIG = {
            WEBHOOK_URL: 'https://script.google.com/macros/s/AKfycbwpDzv2kzEI70hvSsJPp6GTPXszUXNprPJdFm0_Zzhx4qHwD6-0Uc390W_6OBUvVQ1W/exec',
            WEBHOOK_TOKEN: '${{ secrets.WEBHOOK_TOKEN }}'
          };
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: src
      - id: deployment
        uses: actions/deploy-pages@v4
